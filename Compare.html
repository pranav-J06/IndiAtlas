        <button onclick="compareStates()" style="margin-top: 15px;">Compare</button>

        <hr style="margin: 30px 0; border: 1px solid #eee;">

        <div id="tabularSection" style="display: none;">
            <h2 style="margin-top: 0;">Detailed Comparison Data</h2>
            <table border="1" cellpadding="8">
                <tr>
                    <th width="30%">Attribute</th>
                    <th id="name1" width="35%">State 1</th>
                    <th id="name2" width="35%">State 2</th>
                </tr>
                <tr><td><b>Capital</b></td><td id="capital1"></td><td id="capital2"></td></tr>
                <tr><td><b>Formation Year</b></td><td id="year1"></td><td id="year2"></td></tr>
                <tr><td><b>Official Language</b></td><td id="lang1"></td><td id="lang2"></td></tr>
                <tr><td><b>Districts</b></td><td id="districts1"></td><td id="districts2"></td></tr>
                <tr><td><b>Population (2011)</b></td><td id="population1"></td><td id="population2"></td></tr>
                <tr><td><b>Area (sq km)</b></td><td id="area1"></td><td id="area2"></td></tr>
                <tr><td><b>Literacy Rate (%)</b></td><td id="literacy1"></td><td id="literacy2"></td></tr>
                <tr><td><b>GDP (Approx. ₹ Lakh Cr)</b></td><td id="gdp1"></td><td id="gdp2"></td></tr>
            </table>
        </div>

        <div id="visualSection" style="display: none;">
            <h2 style="margin-top: 0;">Visual Data Comparison</h2>
            <div style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;">
                <canvas id="popChart" width="330" height="260" style="background-color: #fcfcfc; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05);"></canvas>
                <canvas id="areaChart" width="330" height="260" style="background-color: #fcfcfc; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05);"></canvas>
                <canvas id="litChart" width="330" height="260" style="background-color: #fcfcfc; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05);"></canvas>
                <canvas id="densityChart" width="330" height="260" style="background-color: #fcfcfc; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05);"></canvas>
                <canvas id="distChart" width="330" height="260" style="background-color: #fcfcfc; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05);"></canvas>
